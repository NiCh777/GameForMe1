<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>დათო ჭიათურაში - საბოლოო ვერსია</title>
    <style>
        body { 
            margin: 0; padding: 0; overflow: hidden; background: #111; 
            font-family: 'Segoe UI', sans-serif; display: flex; 
            justify-content: center; align-items: center; height: 100vh; 
            touch-action: none;
        }
        #game-wrapper { 
            position: relative; aspect-ratio: 400 / 600; 
            max-height: 95vh; max-width: 95vw; 
            border: 4px solid #333; border-radius: 12px; 
            box-shadow: 0 0 40px #000; overflow: hidden; 
        }
        canvas { 
            background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%); 
            display: block; width: 100%; height: 100%; 
        }
        #ui { 
            position: absolute; top: 15px; left: 15px; color: white; 
            font-size: 22px; font-weight: bold; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); 
            z-index: 5; pointer-events: none;
        }
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0, 0, 0, 0.9); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; color: white; 
            text-align: center; z-index: 10; padding: 25px; box-sizing: border-box; 
        }
        .description { 
            font-size: 15px; color: #ddd; margin: 15px 0; line-height: 1.6; 
            background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; 
        }
        button { 
            padding: 15px 45px; font-size: 20px; cursor: pointer; 
            background: #27ae60; color: white; border: none; border-radius: 50px; 
            font-weight: bold; box-shadow: 0 5px 0 #1e8449; transition: 0.2s; 
        }
        button:hover { background: #2ecc71; transform: scale(1.05); }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #1e8449; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="ui">ქულა: 0</div>
    <canvas id="gameCanvas"></canvas>
    <div id="overlay">
        <div id="content">
            <h1 id="title">დათო ჭიათურაში</h1>
            <div class="description">
                დათო გარბის ჭიათურადან! 🚌 <br>
                ხტი ავტობუსებზე და აიცილე "ტვიქსები" 🍫 <br>
                გამოიყენე რაკეტები 🚀 ასაფრენად!
            </div>
            <button id="startBtn">გაქცევა!</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const ui = document.getElementById('ui');
    const overlay = document.getElementById('overlay');
    const content = document.getElementById('content');
    const startBtn = document.getElementById('startBtn');

    canvas.width = 400; canvas.height = 600;

    const playerImg = new Image(); playerImg.src = 'player.png';
    const busImg = new Image(); busImg.src = 'bus.png';
    const obstacleImg = new Image(); obstacleImg.src = 'obstacle.png';

    let player, platforms, emojis, cameraY, score, isRunning, frameCount, lastType;
    let audioCtx;

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playSound(freq, type, duration, vol=0.1) {
        if (!audioCtx || audioCtx.state === 'suspended') return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; 
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function init() {
        player = { x: 170, y: 450, w: 60, h: 60, dy: 0 };
        platforms = []; emojis = []; cameraY = 0; score = 0; 
        frameCount = 0; isRunning = false; lastType = 'bus';
        ui.innerText = "ქულა: 0";
        platforms.push({ x: 50, y: 550, w: 300, h: 45, type: 'bus' });
        for (let i = 1; i < 7; i++) addPlatform(550 - i * 135);
    }

    function addPlatform(yPos) {
        // ტვიქსი არასდროს ჩნდება ზედიზედ (უსაფრთხოებისთვის)
        let type = (lastType === 'obstacle') ? 'bus' : (Math.random() < 0.12 ? 'obstacle' : 'bus');
        lastType = type;
        const w = type === 'obstacle' ? 55 : 110;
        platforms.push({ 
            x: Math.random() * (canvas.width - w), 
            y: yPos, w: w, h: type === 'obstacle' ? 55 : 40, type: type 
        });
    }

    function startGame() {
        initAudio();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        init(); 
        overlay.style.display = 'none'; 
        isRunning = true;
        requestAnimationFrame(update);
    }

    function gameOver(reason) {
        isRunning = false; 
        overlay.style.display = 'flex';
        playSound(150, 'sawtooth', 0.5, 0.2);
        let txt = reason === 'poison' ? "დათო მოიწამლა ჭიათურის მარკეტის ტვიქსით 🍫🤢" : "დათო წავიდა ჭიათურაში... 🚌";
        content.innerHTML = `<h1>წააგე!</h1><p style="font-size:18px">${txt}</p><button onclick="startGame()">თავიდან ცდა</button>`;
    }

    function update() {
        if (!isRunning) return;
        frameCount++;
        
        // რაკეტების გაჩენა
        if (frameCount % 200 === 0) {
            emojis.push({ 
                x: Math.random() < 0.5 ? -40 : 440, 
                y: cameraY + 50 + Math.random() * 250, 
                symbol: "🚀" 
            });
        }

        player.dy += 0.5; // გრავიტაცია
        player.y += player.dy;

        // კამერის მოძრაობა
        if (player.y < cameraY + 280) cameraY = player.y - 280;

        // შეჯახება პლატფორმებთან
        for (let plat of platforms) {
            if (plat.type === 'bus' && player.dy > 0 && 
                player.x + 20 < plat.x + plat.w && player.x + player.w - 20 > plat.x && 
                player.y + player.h >= plat.y && player.y + player.h <= plat.y + 30) {
                player.dy = -14; 
                playSound(450, 'sine', 0.1); 
                break;
            }
            // ტვიქსთან შეჯახება (უფრო პატარა Hitbox სამართლიანობისთვის)
            if (plat.type === 'obstacle' && 
                player.x + 25 < plat.x + plat.w && player.x + player.w - 25 > plat.x && 
                player.y + 25 < plat.y + plat.h && player.y + player.h - 25 > plat.y) {
                gameOver('poison'); 
                return;
            }
        }

        // რაკეტების ლოგიკა
        for (let i = emojis.length - 1; i >= 0; i--) {
            let e = emojis[i]; 
            e.x += (e.x < 200 ? 3 : -3); // მოძრაობენ ცენტრისკენ
            if (Math.abs(player.x + 30 - e.x) < 45 && Math.abs((player.y - cameraY + 30) - (e.y - cameraY)) < 45) {
                player.dy = -28; // დიდი ნახტომი
                score += 100; 
                playSound(800, 'square', 0.3); 
                ui.innerText = "ქულა: " + score; 
                emojis.splice(i, 1);
            }
        }

        // ახალი პლატფორმების დამატება
        if (platforms[platforms.length - 1].y > cameraY - 100) { 
            addPlatform(platforms[platforms.length - 1].y - 135); 
            score += 10; 
            ui.innerText = "ქულა: " + score; 
        }

        // ჩავარდნა
        if (player.y > cameraY + canvas.height) gameOver('fall');
        
        draw(); 
        requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // ხატავს პლატფორმებს
        platforms.forEach(p => {
            const img = p.type === 'obstacle' ? obstacleImg : busImg;
            ctx.drawImage(img, p.x, p.y - cameraY, p.w, p.h);
        });

        // ხატავს რაკეტებს
        ctx.font = "35px Arial"; 
        emojis.forEach(e => ctx.fillText(e.symbol, e.x, e.y - cameraY));

        // ხატავს დათოს
        ctx.drawImage(playerImg, player.x, player.y - cameraY, 60, 60);
    }

    // მართვა (PC & Mobile)
    function handleMove(clientX) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        player.x = (clientX - rect.left) * scaleX - 30;
        
        if (player.x < 0) player.x = 0;
        if (player.x > canvas.width - 60) player.x = canvas.width - 60;
    }

    window.addEventListener('mousemove', (e) => { if (isRunning) handleMove(e.clientX); });
    window.addEventListener('touchmove', (e) => { 
        if (isRunning) {
            handleMove(e.touches[0].clientX);
            e.preventDefault(); 
        }
    }, { passive: false });

    startBtn.addEventListener('click', startGame);
    init();
</script>
</body>
</html>
