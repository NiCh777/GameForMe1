<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>დათო ჭიათურაში - Gamer Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Fira+Sans:wght@700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #050505; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none; }
        
        #game-wrapper { 
            position: relative; aspect-ratio: 400 / 600; max-height: 95vh; max-width: 95vw; 
            border: 3px solid #00f2fe; border-radius: 20px; 
            box-shadow: 0 0 30px rgba(0, 242, 254, 0.2); overflow: hidden; 
        }
        
        canvas { background: #0a0a12; display: block; width: 100%; height: 100%; }
        
        #menu-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(5, 5, 15, 0.9); 
            display: flex; flex-direction: column; justify-content: center; 
            align-items: center; color: white; text-align: center; z-index: 15; padding: 20px; box-sizing: border-box; 
        }

        h1 { font-family: 'Permanent Marker', cursive; font-size: 38px; color: #00f2fe; text-shadow: 0 0 15px #00f2fe; margin: 0 0 15px 0; }
        
        input { 
            background: rgba(255,255,255,0.05); border: 1px solid #4facfe; border-radius: 12px; 
            padding: 12px; color: white; font-size: 18px; width: 80%; text-align: center; margin-bottom: 20px; outline: none;
        }

        .leaderboard { 
            width: 100%; max-width: 320px; background: rgba(255,255,255,0.03); 
            padding: 15px; border-radius: 15px; border: 1px solid rgba(0, 242, 254, 0.2);
        }
        .leaderboard h3 { font-family: 'Fira Sans', sans-serif; color: #ffd700; margin: 0 0 10px 0; font-size: 14px; letter-spacing: 2px; }
        
        .record-item { 
            display: flex; justify-content: space-between; padding: 8px 12px; margin-bottom: 5px; 
            border-radius: 8px; background: rgba(0, 242, 254, 0.05); font-size: 14px;
        }
        .score-val { color: #00f2fe; font-weight: bold; }

        #startBtn { 
            padding: 15px 45px; font-size: 22px; cursor: pointer; 
            background: linear-gradient(45deg, #00f2fe, #4facfe); color: white; 
            border: none; border-radius: 50px; font-family: 'Permanent Marker', cursive;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4); transition: 0.3s; margin-bottom: 20px;
        }
        #startBtn:active { transform: scale(0.95); }

        #ui { position: absolute; top: 15px; left: 15px; color: #00f2fe; font-size: 20px; font-family: 'Fira Sans', sans-serif; font-weight: bold; z-index: 5; text-shadow: 0 0 10px rgba(0,242,254,0.5); }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="ui">SCORE: 0</div>
    <canvas id="gameCanvas"></canvas>
    <div id="menu-overlay">
        <h1>დათო ჭიათურაში</h1>
        <input type="text" id="playerName" placeholder="ჩაწერე სახელი..." maxlength="12">
        <button id="startBtn" onclick="startGame()">START MISSION</button>
        <div class="leaderboard">
            <h3>LEADERBOARD</h3>
            <div id="records-list"></div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const menuOverlay = document.getElementById('menu-overlay');
    const nameInput = document.getElementById('playerName');
    const recordsList = document.getElementById('records-list');
    canvas.width = 400; canvas.height = 600;

    const playerImg = new Image(); playerImg.src = 'player.png';
    const busImg = new Image(); busImg.src = 'bus.png';
    const obstacleImg = new Image(); obstacleImg.src = 'obstacle.png';

    let player, platforms, emojis, cameraY, score, isRunning, frameCount, lastType;
    let stars = [];

    // ვარსკვლავების შექმნა ფონისთვის
    for(let i=0; i<80; i++) {
        stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2, speed: Math.random()*0.5 + 0.2 });
    }

    function updateLeaderboardUI() {
        let records = JSON.parse(localStorage.getItem('datoRecords')) || [];
        recordsList.innerHTML = '';
        if (records.length === 0) recordsList.innerHTML = '<p style="color:#444">No data</p>';
        else records.forEach((res, i) => {
            recordsList.innerHTML += `<div class="record-item"><span>${i+1}. ${res.name}</span><span class="score-val">${res.score}</span></div>`;
        });
    }

    function saveRecord(name, newScore) {
        let records = JSON.parse(localStorage.getItem('datoRecords')) || [];
        records.push({ name: name || 'Dato', score: newScore });
        records.sort((a, b) => b.score - a.score);
        localStorage.setItem('datoRecords', JSON.stringify(records.slice(0, 5)));
    }

    function init() {
        player = { x: 170, y: 450, w: 60, h: 60, dy: 0 };
        platforms = []; emojis = []; cameraY = 0; score = 0; frameCount = 0; isRunning = false; lastType = 'bus';
        document.getElementById('ui').innerText = "SCORE: 0";
        platforms.push({ x: 50, y: 550, w: 300, h: 45, type: 'bus', speed: 0 });
        for (let i = 1; i < 8; i++) addPlatform(550 - i * 100);
        updateLeaderboardUI();
    }

    function addPlatform(yPos) {
        let isObstacle = (lastType !== 'obstacle' && Math.random() < 0.15);
        if (isObstacle) {
            lastType = 'obstacle';
            let obsX = Math.random() * (canvas.width - 55);
            platforms.push({ x: obsX, y: yPos, w: 55, h: 55, type: 'obstacle', speed: 0 });
            let busX = (obsX > canvas.width / 2) ? obsX - 120 : obsX + 70;
            platforms.push({ x: busX, y: yPos, w: 110, h: 40, type: 'bus', speed: 0 });
        } else {
            lastType = 'bus';
            let speed = (Math.random() < 0.4) ? (Math.random() * 2 + 1) * (Math.random() < 0.5 ? 1 : -1) : 0;
            platforms.push({ x: Math.random() * (canvas.width - 110), y: yPos, w: 110, h: 40, type: 'bus', speed: speed });
        }
    }

    function startGame() {
        if (!nameInput.value.trim()) { alert("შეიყვანე სახელი!"); return; }
        init(); menuOverlay.style.display = 'none'; isRunning = true;
        requestAnimationFrame(update);
    }

    function gameOver(reason) {
        isRunning = false; saveRecord(nameInput.value, score);
        menuOverlay.style.display = 'flex';
        let msg = (reason === 'poison') ? "დათო მოიწამლა ჭიათურის ტვიქსით" : "დათო დაუბრუნდა ჭიათურას";
        menuOverlay.innerHTML = `
            <h1 style="color:#ff0033">MISSION FAILED</h1>
            <p style="margin:5px; color:#666">${msg}</p>
            <h2 style="margin:10px; color:#00f2fe">SCORE: ${score}</h2>
            <button id="startBtn" onclick="location.reload()">RESPAWN</button>
            <div class="leaderboard"><h3>LEADERBOARD</h3><div id="records-list"></div></div>`;
        updateLeaderboardUI();
    }

    function update() {
        if (!isRunning) return;
        frameCount++;
        
        // ვარსკვლავების მოძრაობა
        stars.forEach(s => {
            s.y += s.speed;
            if(s.y > canvas.height) s.y = 0;
        });

        if (frameCount % 180 === 0) {
            let fromLeft = Math.random() < 0.5;
            emojis.push({ x: fromLeft ? -50 : 450, y: cameraY + 50 + Math.random() * 300, symbol: "🚀", speed: fromLeft ? 4 : -4 });
        }
        
        player.dy += 0.5; player.y += player.dy;
        if (player.y < cameraY + 280) cameraY = player.y - 280;

        platforms.forEach(p => {
            if (p.speed !== 0) {
                p.x += p.speed;
                if (p.x < 0 || p.x > canvas.width - p.w) p.speed *= -1;
            }
            if (p.type === 'bus' && player.dy > 0 && player.x + 15 < p.x + p.w && player.x + player.w - 15 > p.x && player.y + player.h >= p.y && player.y + player.h <= p.y + 35) {
                player.dy = -14;
            }
            if (p.type === 'obstacle' && player.x + 20 < p.x + p.w && player.x + player.w - 20 > p.x && player.y + 20 < p.y + p.h && player.y + player.h - 20 > p.y) {
                gameOver('poison');
            }
        });

        for (let i = emojis.length - 1; i >= 0; i--) {
            let e = emojis[i]; e.x += e.speed;
            if (Math.abs(player.x + 30 - e.x) < 45 && Math.abs((player.y - cameraY + 30) - (e.y - cameraY)) < 45) {
                player.dy = -28; score += 100; document.getElementById('ui').innerText = "SCORE: " + score; emojis.splice(i, 1);
            }
            if (e.x < -100 || e.x > 500) emojis.splice(i, 1);
        }

        if (platforms[platforms.length - 1].y > cameraY - 100) { addPlatform(platforms[platforms.length - 1].y - 100); score += 10; document.getElementById('ui').innerText = "SCORE: " + score; }
        if (player.y > cameraY + canvas.height) gameOver('fall');
        draw(); requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // ფონის ვარსკვლავები
        ctx.fillStyle = "white";
        stars.forEach(s => ctx.fillRect(s.x, s.y, s.size, s.size));

        platforms.forEach(p => ctx.drawImage(p.type === 'obstacle' ? obstacleImg : busImg, p.x, p.y - cameraY, p.w, p.h));
        ctx.font = "35px Arial"; emojis.forEach(e => ctx.fillText(e.symbol, e.x, e.y - cameraY));
        ctx.drawImage(playerImg, player.x, player.y - cameraY, 60, 60);
    }

    function handleMove(clientX) {
        const rect = canvas.getBoundingClientRect();
        player.x = (clientX - rect.left) * (canvas.width / rect.width) - 30;
        if (player.x < 0) player.x = 0; if (player.x > canvas.width - 60) player.x = canvas.width - 60;
    }
    window.addEventListener('mousemove', (e) => { if (isRunning) handleMove(e.clientX); });
    window.addEventListener('touchmove', (e) => { if (isRunning) { handleMove(e.touches[0].clientX); e.preventDefault(); } }, { passive: false });
    updateLeaderboardUI();
</script>
</body>
</html>
