<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>დათო ჭიათურაში - Intro Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; touch-action: none; }
        #game-wrapper { position: relative; aspect-ratio: 400 / 600; max-height: 95vh; max-width: 95vw; border: 4px solid #333; border-radius: 12px; box-shadow: 0 0 40px #000; overflow: hidden; }
        canvas { background: linear-gradient(to bottom, #4facfe 0%, #00f2fe 100%); display: block; width: 100%; height: 100%; }
        
        /* შავი ინტრო ეკრანი */
        #intro-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 20; display: flex; flex-direction: column;
            justify-content: center; align-items: center; transition: 1.5s;
        }
        #intro-text {
            color: #ff0000; font-size: 35px; font-weight: bold; text-align: center;
            opacity: 0; animation: fadeInOut 3s forwards; text-shadow: 0 0 15px red;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: scale(0.9); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        /* მენიუ ეკრანი (ამონათების შემდეგ) */
        #menu-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; color: #333; text-align: center; z-index: 15; padding: 30px;
        }
        .description { font-size: 18px; margin-bottom: 30px; color: #555; line-height: 1.5; }
        #startBtn { 
            padding: 15px 45px; font-size: 22px; cursor: pointer; 
            background: #27ae60; color: white; border: none; border-radius: 50px; 
            font-family: 'Permanent Marker', cursive; box-shadow: 0 5px 0 #1e8449; transition: 0.2s;
        }
        #startBtn:active { transform: translateY(3px); box-shadow: 0 2px 0 #1e8449; }
        #ui { position: absolute; top: 15px; left: 15px; color: white; font-size: 22px; font-weight: bold; text-shadow: 2px 2px 5px rgba(0,0,0,0.5); z-index: 5; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="ui">ქულა: 0</div>
    <canvas id="gameCanvas"></canvas>
    
    <div id="intro-overlay" onclick="runIntro()">
        <div id="intro-text">დათოს გაქცევა<br>ჭიათურიდან</div>
        <p style="color: #444; margin-top: 30px; font-size: 12px;">დააჭირე გასაგრძელებლად</p>
    </div>

    <div id="menu-overlay">
        <h1 style="color: #2c3e50; margin-bottom: 10px;">მზად ხარ?</h1>
        <p class="description">დაეხმარე დათოს ავტობუსებზე გადახტომაში და აიცილე ტვიქსები!</p>
        <button id="startBtn" onclick="startGame()">დაწყება</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const introOverlay = document.getElementById('intro-overlay');
    const menuOverlay = document.getElementById('menu-overlay');
    
    canvas.width = 400; canvas.height = 600;

    const playerImg = new Image(); playerImg.src = 'player.png';
    const busImg = new Image(); busImg.src = 'bus.png';
    const obstacleImg = new Image(); obstacleImg.src = 'obstacle.png';

    let player, platforms, emojis, cameraY, score, isRunning, frameCount, lastType, audioCtx;

    function playSound(freq, type, duration, vol=0.1) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.connect(gain); gain.connect(audioCtx.destination);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function runIntro() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        playSound(80, 'sawtooth', 2, 0.2); // დრამატული ბასი
        
        setTimeout(() => {
            introOverlay.style.opacity = '0';
            setTimeout(() => {
                introOverlay.style.display = 'none';
                menuOverlay.style.display = 'flex';
                playSound(600, 'sine', 0.2, 0.1); // ამონათების ხმა
            }, 1500);
        }, 2500);
    }

    function init() {
        player = { x: 170, y: 450, w: 60, h: 60, dy: 0 };
        platforms = []; emojis = []; cameraY = 0; score = 0; frameCount = 0; isRunning = false; lastType = 'bus';
        document.getElementById('ui').innerText = "ქულა: 0";
        platforms.push({ x: 50, y: 550, w: 300, h: 45, type: 'bus' });
        for (let i = 1; i < 8; i++) addPlatform(550 - i * 100);
    }

    function addPlatform(yPos) {
        let type = (lastType === 'obstacle') ? 'bus' : (Math.random() < 0.12 ? 'obstacle' : 'bus');
        lastType = type;
        const w = type === 'obstacle' ? 55 : 110;
        platforms.push({ x: Math.random() * (canvas.width - w), y: yPos, w: w, h: type === 'obstacle' ? 55 : 40, type: type });
    }

    function startGame() {
        init();
        menuOverlay.style.display = 'none';
        isRunning = true;
        requestAnimationFrame(update);
    }

    function gameOver() {
        isRunning = false;
        menuOverlay.style.display = 'flex';
        playSound(150, 'sawtooth', 0.5, 0.2);
        menuOverlay.innerHTML = `<h1>წააგე</h1><button id="startBtn" onclick="startGame()">თავიდან</button>`;
    }

    function update() {
        if (!isRunning) return;
        frameCount++;
        if (frameCount % 180 === 0) {
            let fromLeft = Math.random() < 0.5;
            emojis.push({ x: fromLeft ? -50 : 450, y: cameraY + 50 + Math.random() * 300, symbol: "🚀", speed: fromLeft ? 4 : -4 });
        }
        player.dy += 0.5; player.y += player.dy;
        if (player.y < cameraY + 280) cameraY = player.y - 280;
        for (let plat of platforms) {
            if (plat.type === 'bus' && player.dy > 0 && player.x + 15 < plat.x + plat.w && player.x + player.w - 15 > plat.x && player.y + player.h >= plat.y && player.y + player.h <= plat.y + 35) {
                player.dy = -14; playSound(450, 'sine', 0.1); break;
            }
            if (plat.type === 'obstacle' && player.x + 25 < plat.x + plat.w && player.x + player.w - 25 > plat.x && player.y + 25 < plat.y + plat.h && player.y + player.h - 25 > plat.y) {
                gameOver(); return;
            }
        }
        for (let i = emojis.length - 1; i >= 0; i--) {
            let e = emojis[i]; e.x += e.speed;
            if (Math.abs(player.x + 30 - e.x) < 45 && Math.abs((player.y - cameraY + 30) - (e.y - cameraY)) < 45) {
                player.dy = -28; score += 100; playSound(800, 'square', 0.3); document.getElementById('ui').innerText = "ქულა: " + score; emojis.splice(i, 1);
            }
            if (e.x < -100 || e.x > 500) emojis.splice(i, 1);
        }
        if (platforms[platforms.length - 1].y > cameraY - 100) { addPlatform(platforms[platforms.length - 1].y - 100); score += 10; document.getElementById('ui').innerText = "ქულა: " + score; }
        if (player.y > cameraY + canvas.height) gameOver();
        draw(); requestAnimationFrame(update);
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        platforms.forEach(p => ctx.drawImage(p.type === 'obstacle' ? obstacleImg : busImg, p.x, p.y - cameraY, p.w, p.h));
        ctx.font = "35px Arial"; emojis.forEach(e => ctx.fillText(e.symbol, e.x, e.y - cameraY));
        ctx.drawImage(playerImg, player.x, player.y - cameraY, 60, 60);
    }

    function handleMove(clientX) {
        const rect = canvas.getBoundingClientRect();
        player.x = (clientX - rect.left) * (canvas.width / rect.width) - 30;
        if (player.x < 0) player.x = 0; if (player.x > canvas.width - 60) player.x = canvas.width - 60;
    }
    window.addEventListener('mousemove', (e) => { if (isRunning) handleMove(e.clientX); });
    window.addEventListener('touchmove', (e) => { if (isRunning) { handleMove(e.touches[0].clientX); e.preventDefault(); } }, { passive: false });
</script>
</body>
</html>
